version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - ml-service

  ml-service:
    build: ./ml-service
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
    volumes:
      - ./ml-service:/app
